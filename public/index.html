<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小虾米</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-card-hover: #222230;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-success: #10b981;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #2d2d3a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --user-msg: #2d4a3e;
      --ai-msg: #1e3a5f;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15), transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.1), transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    .container { width: 100%; max-width: 100%; margin: 0 auto; padding: 8px; padding-bottom: 40px; box-sizing: border-box; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; margin-bottom: 8px; border-bottom: 1px solid var(--border-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .btn {
      padding: 8px 16px; border-radius: var(--radius-sm); border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
    .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer; }
    .tabs {
      display: flex; gap: 4px; background: var(--bg-secondary); padding: 4px;
      border-radius: var(--radius-md); margin-bottom: 8px; overflow-x: auto;
      justify-content: space-evenly;
    }
    .tab {
      flex: 1; text-align: center; padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary);
      background: transparent; border: none; border-radius: var(--radius-sm);
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { background: var(--accent-primary); color: white; }
    .section { display: none; margin-top: -40px; padding-top: 0; }
    .section.active { display: block; }
    #section-dashboard { margin-top: 0; }
    .section .card:first-child { margin-top: 0; }
    .card {
      background: var(--bg-card); border-radius: var(--radius-lg); padding: 12px;
      margin-bottom: 8px; border: 1px solid var(--border-color);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .status-item { background: var(--bg-secondary); padding: 16px; border-radius: var(--radius-md); }
    .status-label { font-size: 12px; color: var(--text-muted); }
    .status-value { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .success { color: var(--accent-success); }
    .danger { color: var(--accent-danger); }
    .warning { color: var(--accent-warning); }
    
    /* Model Selector */
    .model-current {
      padding: 16px 20px; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1));
      border: 2px solid var(--accent-primary); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.2s;
    }
    .model-current:hover { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2)); }
    .model-current.active { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2)); }
    .model-badge {
      padding: 4px 10px; background: var(--accent-primary); color: white;
      font-size: 10px; font-weight: 600; border-radius: 10px; text-transform: uppercase;
    }
    .model-name { font-weight: 600; font-size: 16px; }
    .model-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .model-list { display: none; flex-direction: column; gap: 8px; margin-top: 12px; }
    .model-list.show { display: flex; }
    .model-item {
      padding: 14px 18px; background: var(--bg-secondary); border-radius: var(--radius-md);
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s; border: 2px solid transparent;
    }
    .model-item:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }
    .model-item.active { border: 2px solid var(--accent-success); background: rgba(16,185,129,0.1); }
    .model-check { color: var(--accent-success); font-size: 18px; }
    
    /* Log Viewer */
    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }
    .log-filters { display: flex; gap: 4px; }
    .filter-btn {
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--bg-card-hover); }
    .filter-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .log-actions { display: flex; gap: 8px; }
    .log-container {
      background: #0d1117; border-radius: var(--radius-md); padding: 12px;
      max-height: 500px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      line-height: 1.7; color: #c9d1d9;
    }
    .log-line { display: flex; gap: 8px; padding: 2px 0; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-level { flex-shrink: 0; width: 50px; }
    .log-level.info { color: var(--accent-primary); }
    .log-level.warn { color: var(--accent-warning); }
    .log-level.error { color: var(--accent-danger); }
    .log-level.ws { color: var(--accent-success); }
    
    /* Config */
    .config-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .config-tab {
      padding: 6px 12px; font-size: 12px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
    }
    .config-tab.active { background: var(--accent-primary); color: white; }
    .config-actions { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 10px; }
    .config-editor textarea {
      width: 100%; min-height: 400px; padding: 14px;
      background: #0a0a0f; border: 1px solid var(--border-color);
      border-radius: var(--radius-md); color: #e0e0e0;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
      resize: none; box-sizing: border-box;
    }
    
    /* Form Config Styles */
    .view-mode-group { display: flex; gap: 4px; }
    .view-mode-group .btn { padding: 8px 16px; font-size: 13px; border: 1px solid var(--accent-primary); background: transparent; color: var(--text-secondary); }
    .view-mode-group .btn.active { background: var(--accent-primary); color: white; }
    
    .form-config { padding: 12px; background: #0a0a0f; border-radius: var(--radius-md); margin-bottom: 12px; }
    .form-field { margin-bottom: 16px; }
    .form-label { display: block; font-weight: 500; margin-bottom: 6px; color: var(--text-primary); }
    .form-input, .form-select { 
      width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); 
      border-radius: var(--radius-sm); background: #0a0a0f; color: #e0e0e0;
      font-size: 13px;
    }
    .form-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    
    .toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer; inset: 0;
      background: var(--bg-primary); border-radius: 24px; transition: 0.3s; border: 1px solid var(--border-color);
    }
    .toggle-slider:before {
      position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px;
      background: white; border-radius: 50%; transition: 0.3s;
    }
    .toggle input:checked + .toggle-slider { background: var(--accent-primary); }
    .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }
    
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-warning { background: var(--accent-warning); color: #000; }
    .config-editor textarea:focus { outline: none; border-color: var(--accent-primary); }
    
    /* Backup */
    .backup-item {
      padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .backup-info { flex: 1; }
    .backup-name { font-weight: 500; font-size: 13px; }
    .backup-time { font-size: 11px; color: var(--text-muted); }
    .backup-actions { display: flex; gap: 6px; }
    
    /* Skills */
    .skill-item {
      padding: 14px 16px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
    }
    .skill-item:hover { background: var(--bg-card-hover); }
    .skill-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; color: var(--text-primary); }
    .skill-desc { font-size: 13px; color: #94a3b8; line-height: 1.5; }
    
    /* Cron */
    .cron-item {
      padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px;
    }
    .cron-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cron-name { font-weight: 600; font-size: 15px; }
    .cron-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .cron-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-success); }
    .cron-dot.stopped { background: var(--accent-danger); }
    .cron-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 12px; color: var(--text-muted); }
    .cron-detail span { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
    
    /* Sessions */
    .session-item {
      padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px;
    }
    .session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .session-name { font-weight: 500; font-size: 14px; }
    .session-badge {
      padding: 2px 8px; font-size: 10px; border-radius: 10px; background: var(--accent-primary); color: white;
    }
    .session-badge.topic { background: var(--accent-secondary); }
    .session-badge.deleted { background: var(--accent-danger); }
    .session-stats { display: flex; gap: 12px; }
    .session-stat { text-align: center; }
    .session-stat-value { font-size: 20px; font-weight: 600; }
    .session-stat-value.warning { color: var(--accent-warning); }
    .session-stat-label { font-size: 11px; color: var(--text-muted); }
    
    /* 聊天抽屉 */
    .chat-drawer { display: none; position: absolute; left: 8px; top: 50px; bottom: 8px; width: 260px; background: var(--bg-secondary); z-index: 1001; transform: translateX(-120%); transition: transform 0.3s ease; flex-direction: column; border-radius: var(--radius-md); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    .chat-drawer.open { display: flex; transform: translateX(0); }
    .chat-drawer-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 1000; }
    .chat-drawer-overlay.open { display: block; }
    .chat-drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border-color); }
    .card { position: relative; }
    .chat-header { flex-wrap: wrap; gap: 8px; }
    .chat-menu-btn { display: block !important; }
    
    /* 聊天响应式 */
    @media (max-width: 600px) {
      .chat-container { height: calc(100vh - 160px) !important; min-height: 200px !important; }
      .chat-drawer { left: 8px; right: 8px; width: auto; }
      .chat-header .card-title { order: 2; flex: 1; text-align: center; }
      .chat-header .btn-sm { order: 3; }
      .chat-menu-btn { order: 1; }
      .chat-main { padding: 6px !important; }
      #chat-messages { gap: 4px !important; }
      #chat-messages > div { font-size: 13px !important; padding: 6px 10px !important; }
      #chat-input { padding: 6px 10px !important; font-size: 13px !important; }
      .section { padding: 4px; }
      .card { padding: 8px !important; }
    }
    
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); border: 1px solid var(--border-color);
      padding: 12px 20px; border-radius: var(--radius-md); font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1000; display: none;
    }
    .toast.show { display: block; }
    
    select, input {
      padding: 8px 12px; background: var(--bg-secondary);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <div class="logo">🦞</div>
        <h1>小虾米</h1>
      </div>
      <button class="btn-icon" onclick="refreshAll()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">概览</button>
      <button class="tab" data-tab="cron">定时任务</button>
      <button class="tab" data-tab="sessions">会话</button>
      <button class="tab" data-tab="skills">Skills</button>
      <button class="tab" data-tab="chat">聊天</button>
      <button class="tab" data-tab="logs">日志</button>
      <button class="tab" data-tab="config">配置</button>
    </div>

    <!-- Dashboard -->
    <div class="section active" id="section-dashboard">
      <!-- Model Selector -->
      <div class="card" style="background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1)); border: 2px solid var(--accent-primary);">
        <div class="card-header"><span class="card-title">🤖 当前模型</span></div>
        <div class="model-current" onclick="toggleModelList()">
          <div>
            <div class="model-name" id="current-model-name">--</div>
            <div class="model-detail" id="current-model-detail">点击选择模型</div>
          </div>
          <span class="model-badge" id="current-model-badge">当前</span>
        </div>
        <div class="model-list" id="model-list"></div>
      </div>
      
      <!-- Weather -->
      <div class="card" style="background: linear-gradient(135deg, #1e3a5f, #0f172a); border: 1px solid #1e40af;">
        <div style="text-align:center;margin-bottom:12px;">
          <div style="font-size:28px;font-weight:700;color:#fff;margin-bottom:4px;" id="greeting-text">你好 👋</div>
          <div style="font-size:14px;color:rgba(255,255,255,0.8);" id="datetime-text">--</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="flex:1;">
            <div style="font-size:14px;color:rgba(255,255,255,0.7);">🌤️ 北京天气</div>
            <div style="display:flex;align-items:baseline;gap:8px;">
              <span style="font-size:48px;font-weight:700;color:#fff;" id="weather-temp">--°</span>
              <span style="font-size:16px;color:rgba(255,255,255,0.8);" id="weather-desc">加载中...</span>
            </div>
          </div>
          <div style="font-size:48px;" id="weather-icon">⛅</div>
        </div>
        <div style="display:flex;justify-content:space-around;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.2);">
          <div style="text-align:center;">
            <div style="font-size:12px;color:rgba(255,255,255,0.6);">💧 湿度</div>
            <div style="font-size:18px;font-weight:600;color:#fff;" id="weather-humidity">--%</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:12px;color:rgba(255,255,255,0.6);">🌡️ 体感</div>
            <div style="font-size:18px;font-weight:600;color:#fff;" id="weather-feels">--°</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:12px;color:rgba(255,255,255,0.6);">🕐 更新</div>
            <div style="font-size:14px;font-weight:500;color:#fff;" id="weather-update">--</div>
          </div>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.2);">
          <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:8px;">📅 天气预报</div>
          <div id="weather-forecast" style="display:flex;justify-content:space-between;"></div>
        </div>
      </div>
      
      <!-- System Status -->
      <div class="card">
        <div class="card-header"><span class="card-title">📊 系统状态</span></div>
        <div class="status-grid">
          <div class="status-item">
            <div class="status-label">Gateway</div>
            <div class="status-value" id="gw-status">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">版本 <span id="version-badge" style="display:none;padding:2px 6px;background:var(--accent-warning);color:#000;font-size:10px;border-radius:8px;margin-left:4px;">新!</span></div>
            <div class="status-value" id="version">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">Telegram</div>
            <div class="status-value" id="tg-status">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">定时任务</div>
            <div class="status-value" id="cron-count">--</div>
          </div>
        </div>
      </div>
    </div>
        </div>
        <div class="model-list" id="model-list"></div>
      </div>
    </div>

    <!-- Cron -->
    <div class="section" id="section-cron" >
      <div class="card">
        <div class="card-header"><span class="card-title">⏰ 定时任务</span></div>
        <div id="cron-list">加载中...</div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="section" id="section-sessions" >
      <div class="card">
        <div class="card-header"><span class="card-title">💬 会话状态</span></div>
        <div id="sessions-stats" class="session-stats" style="margin-bottom:8px;"></div>
        <div id="sessions-list">加载中...</div>
      </div>
    </div>

    <!-- Chat -->
    <div class="section" id="section-chat">
      <div class="card">
        <div class="card-header chat-header">
          <button class="btn btn-icon chat-menu-btn" onclick="toggleChatDrawer()">☰</button>
          <span class="card-title" id="chat-current-name">💬 聊天</span>
          <button class="btn btn-primary btn-sm" onclick="createChatSession()">+ 新建</button>
        </div>
        <!-- 抽屉 -->
        <div class="chat-drawer" id="chat-drawer">
          <div class="chat-drawer-header">
            <span>会话列表</span>
            <button class="btn btn-sm" onclick="toggleChatDrawer()" style="padding:4px 8px;">✕</button>
          </div>
          <div id="chat-sessions" style="flex:1;overflow-y:auto;">
            加载中...
          </div>
        </div>
        <div class="chat-drawer-overlay" id="chat-drawer-overlay" onclick="toggleChatDrawer()"></div>
        <div class="chat-container" style="display:flex;gap:12px;height:calc(100vh - 260px);min-height:300px;">
          <div class="chat-main" style="flex:1;display:flex;flex-direction:column;background:var(--bg-secondary);border-radius:8px;padding:10px;">
            <div id="chat-messages" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
              <div style="color:var(--text-muted);text-align:center;padding:20px;">选择或创建一个会话开始聊天</div>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px;">
              <input type="text" id="chat-input" placeholder="输入消息..." style="flex:1;background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:8px 12px;font-size:14px;color:var(--text-primary);outline:none;" onkeypress="if(event.key==='Enter')sendChatMessage()">
              <button class="btn btn-primary" onclick="sendChatMessage()">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Skills -->
    <div class="section" id="section-skills" >
      <div class="card">
        <div class="card-header"><span class="card-title">🔧 Skills 列表</span></div>
        <div id="skills-list">加载中...</div>
      </div>
    </div>

    <!-- Logs -->
    <div class="section" id="section-logs" >
      <div class="card">
        <div class="log-toolbar">
          <div class="log-filters">
            <button class="filter-btn active" data-level="all" onclick="setLogFilter('all', this)">全部</button>
            <button class="filter-btn" data-level="info" onclick="setLogFilter('info', this)">Info</button>
            <button class="filter-btn" data-level="warn" onclick="setLogFilter('warn', this)">Warn</button>
            <button class="filter-btn" data-level="error" onclick="setLogFilter('error', this)">Error</button>
            <button class="filter-btn" data-level="ws" onclick="setLogFilter('ws', this)">WS</button>
          </div>
          <div class="log-actions">
            <button class="btn btn-sm" onclick="toggleAutoScroll()" id="autoscroll-btn">⏸ 暂停</button>
            <button class="btn btn-sm btn-secondary" onclick="clearLogs()">清空</button>
            <button class="btn btn-sm btn-primary" onclick="loadLogs()">刷新</button>
          </div>
        </div>
        <input type="text" id="log-search" placeholder="搜索关键词..." style="width:100%;margin-bottom:8px;" oninput="loadLogs()" />
        <div class="log-container" id="log-container">
          <div class="log-line"><span class="log-time">加载中...</span></div>
        </div>
      </div>
    </div>

    <!-- Config -->
    <div class="section" id="section-config" >
      <div class="card">
        <div class="card-header"><span class="card-title">⚡ 快捷操作</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <button class="btn btn-primary" onclick="createBackup()">💾 备份</button>
          <button class="btn btn-secondary" onclick="restartGateway()">🔄 重启</button>
          <button class="btn btn-secondary" onclick="runDoctorFix()">🩺 Doctor</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📋 备份记录</span></div>
        <div id="backup-list">加载中...</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📁 配置文件</span></div>
        <div class="config-tabs">
          <button class="config-tab active" onclick="switchConfig('openclaw.json', this)">openclaw.json</button>
          <button class="config-tab" onclick="switchConfig('AGENTS.md', this)">AGENTS.md</button>
          <button class="config-tab" onclick="switchConfig('SOUL.md', this)">SOUL.md</button>
          <button class="config-tab" onclick="switchConfig('TOOLS.md', this)">TOOLS.md</button>
          <button class="config-tab" onclick="switchConfig('USER.md', this)">USER.md</button>
          <button class="config-tab" onclick="switchConfig('MEMORY.md', this)">MEMORY.md</button>
        </div>
        <div class="config-actions">
          <div class="view-mode-group">
            <button class="btn btn-sm view-mode-btn active" data-mode="json" onclick="toggleConfigView('json')">JSON</button>
            <button class="btn btn-sm view-mode-btn" data-mode="form" onclick="toggleConfigView('form')">表单</button>
          </div>
          <button class="btn btn-secondary" onclick="validateConfig()">✓ 验证</button>
          <button class="btn btn-primary" onclick="saveConfig()">💾 保存</button>
          <button class="btn btn-warning" id="apply-form-btn" style="display:none;" onclick="applyFormChanges()">✓ 应用更改</button>
        </div>
        <div id="config-form-view" style="display:none;"></div>
        <textarea id="config-content" style="width:100%;min-height:400px;resize:none;background:#0a0a0f;color:#e0e0e0;border:1px solid #2d2d3a;"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    let currentTab = 'dashboard';
    let currentConfig = 'openclaw.json';
    let logFilter = 'all';
    let autoScroll = true;
    let logData = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function api(url) {
      try {
        const res = await fetch(API_BASE + url);
        return await res.json();
      } catch (e) {
        return { error: e.message };
      }
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('section-' + tab.dataset.tab).classList.add('active');
        currentTab = tab.dataset.tab;
        if (currentTab === 'logs') loadLogs();
        if (currentTab === 'chat') initChat();
      });
    });

    async function refreshAll() {
      loadStatus();
      loadModels();
      loadCron();
      loadSessions();
      loadSkills();
      loadChatSessions();
      loadLogs();
      loadBackups();
      loadConfigs();
      showToast('已刷新');
    }
    
    // Update time every second
    setInterval(updateGreeting, 1000);
    setInterval(loadStatus, 60000);

    // Status
    async function loadStatus() {
      const [statusData, weatherData] = await Promise.all([
        api('/api/status'),
        api('/api/weather')
      ]);
      
      if (!statusData.error) {
        document.getElementById('gw-status').textContent = statusData.gatewayStatus === 'running' ? '运行中' : '已停止';
        document.getElementById('gw-status').className = 'status-value ' + (statusData.gatewayStatus === 'running' ? 'success' : 'danger');
        document.getElementById('version').textContent = statusData.version || '--';
        
        // Show version update badge
        if (statusData.updateInfo?.available) {
          const badge = document.getElementById('version-badge');
          badge.textContent = 'v' + statusData.updateInfo.version + ' 新!';
          badge.style.display = 'inline';
        }
        
        document.getElementById('tg-status').textContent = statusData.channels?.telegram?.enabled ? '已启用' : '未启用';
        document.getElementById('cron-count').textContent = statusData.cronJobs || 0;
      }
      
      // Weather
      if (!weatherData.error && !weatherData.configNeeded) {
        const icons = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};
        document.getElementById('weather-icon').textContent = icons[weatherData.icon] || '⛅';
        document.getElementById('weather-temp').textContent = (weatherData.temp || '--') + '°';
        document.getElementById('weather-desc').textContent = weatherData.description || '--';
        document.getElementById('weather-humidity').textContent = (weatherData.humidity || '--') + '%';
        document.getElementById('weather-feels').textContent = (weatherData.feels_like || '--') + '°';
        document.getElementById('weather-update').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        
        // Render forecast
        const forecastContainer = document.getElementById('weather-forecast');
        if (weatherData.forecast && weatherData.forecast.length > 0) {
          forecastContainer.innerHTML = weatherData.forecast.map(f => `
            <div style="text-align:center;padding:8px;">
              <div style="font-size:12px;color:rgba(255,255,255,0.6);">${f.time}</div>
              <div style="font-size:16px;">${icons[f.icon] || '🌤️'}</div>
              <div style="font-size:14px;font-weight:600;color:#fff;">${f.temp}°</div>
            </div>
          `).join('');
        }
      } else {
        document.getElementById('weather-temp').textContent = '--°';
        document.getElementById('weather-desc').textContent = '未配置';
      }
      
      // Update greeting and datetime
      updateGreeting();
    }
    
    function updateGreeting() {
      const now = new Date();
      const hour = now.getHours();
      let greeting = '你好';
      let emoji = '👋';
      
      if (hour >= 5 && hour < 9) { greeting = '早上好'; emoji = '🌅'; }
      else if (hour >= 9 && hour < 12) { greeting = '上午好'; emoji = '☀️'; }
      else if (hour >= 12 && hour < 14) { greeting = '中午好'; emoji = '🍜'; }
      else if (hour >= 14 && hour < 15) { greeting = '下午茶时间'; emoji = '☕'; }
      else if (hour >= 15 && hour < 18) { greeting = '下午好'; emoji = '🌤️'; }
      else if (hour >= 18 && hour < 22) { greeting = '晚上好'; emoji = '🌙'; }
      else { greeting = '夜深了'; emoji = '🌃'; }
      
      document.getElementById('greeting-text').textContent = greeting + ' ' + emoji;
      
      const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('datetime-text').textContent = dateStr + ' ' + timeStr;
    }

    // Models
    async function loadModels() {
      const data = await api('/api/models');
      const primary = data.defaults?.primary || '';
      
      document.getElementById('current-model-name').textContent = primary || '未设置';
      document.getElementById('current-model-detail').textContent = '点击切换模型';
      
      const list = document.getElementById('model-list');
      let html = '';
      for (const [provider, cfg] of Object.entries(data.providers || {})) {
        for (const model of cfg.models || []) {
          const fullId = provider + '/' + model.id;
          const isActive = fullId === primary;
          html += `
            <div class="model-item ${isActive ? 'active' : ''}" onclick="switchModel('${provider}', '${model.id}')">
              <div>
                <div class="model-name">${model.name}</div>
                <div class="model-detail">${provider} · ${(model.contextWindow / 1000).toFixed(0)}K</div>
              </div>
              ${isActive ? '<span class="model-check">✓</span>' : ''}
            </div>
          `;
        }
      }
      list.innerHTML = html;
    }

    function toggleModelList() {
      document.getElementById('model-list').classList.toggle('show');
      document.querySelector('.model-current').classList.toggle('active');
    }

    async function switchModel(provider, modelId) {
      const primary = provider + '/' + modelId;
      
      // Auto-set the other model as fallback
      let fallbacks = [];
      if (provider === 'minimax-portal') {
        fallbacks = ['kimi-coding/k2p5'];
      } else if (provider === 'kimi-coding') {
        fallbacks = ['minimax-portal/MiniMax-M2.5'];
      }
      
      await fetch(API_BASE + '/api/models/switch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ primary, fallbacks })
      });
      showToast('模型已切换: ' + modelId + '\n备用模型: ' + fallbacks.join(', '));
      loadModels();
      toggleModelList();
    }

    // Cron
    async function loadCron() {
      const data = await api('/api/cron');
      const container = document.getElementById('cron-list');
      container.innerHTML = (data || []).map(j => `
        <div class="cron-item">
          <div class="cron-header">
            <span class="cron-name">${j.name || j.id}</span>
            <div class="cron-status">
              <label class="toggle" title="启用/禁用">
                <input type="checkbox" ${j.enabled ? 'checked' : ''} onchange="toggleCronJob('${j.id}', this.checked)">
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
          <div class="cron-details">
            <div class="cron-detail" style="display:flex;align-items:center;gap:8px;">
              <span>执行时间:</span>
              <input type="text" class="cron-input" value="${j.schedule}" 
                onchange="updateCronField('${j.id}', 'schedule', this.value)" 
                style="width:120px;padding:4px 8px;font-size:12px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:4px);color:var(--text-primary);">
            </div>
            <div class="cron-detail" style="display:flex;align-items:center;gap:8px;">
              <span>会话目标:</span>
              <input type="text" class="cron-input" value="${j.sessionTarget || 'main'}" 
                onchange="updateCronField('${j.id}', 'sessionTarget', this.value)"
                style="width:80px;padding:4px 8px;font-size:12px;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:4px;color:var(--text-primary);">
            </div>
            <div class="cron-detail">任务类型: <span>${j.taskType || '其他任务'}</span></div>
            <div class="cron-detail">下次执行: <span>${j.nextRun || '--'}</span></div>
            <div class="cron-detail">上次状态: <span>${j.lastStatus || '--'}</span></div>
          </div>
        </div>
      `).join('') || '暂无定时任务';
    }
    
    async function toggleCronJob(jobId, enabled) {
      const res = await fetch(API_BASE + '/api/cron/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId, updates: { enabled } })
      });
      const data = await res.json();
      showToast(data.success ? (enabled ? '定时任务已启用' : '定时任务已禁用') : '更新失败');
    }
    
    async function updateCronField(jobId, field, value) {
      const res = await fetch(API_BASE + '/api/cron/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId, updates: { [field]: value } })
      });
      const data = await res.json();
      showToast(data.success ? '已更新' : '更新失败');
    }

    // Sessions
    async function loadSessions() {
      const data = await api('/api/sessions');
      
      // Show only Telegram bots that have a botId (actual bots)
      const telegramBots = (data.telegram || []).filter(s => s.botId);
      
      // Summary stats
      document.getElementById('sessions-stats').innerHTML = `
        <div class="session-stat"><div class="session-stat-value success">${data.agentSessions?.length || 0}</div><div class="session-stat-label">活跃会话</div></div>
        <div class="session-stat"><div class="session-stat-value">${telegramBots.length}</div><div class="session-stat-label">Telegram Bot</div></div>
        <div class="session-stat"><div class="session-stat-value warning">${data.summary?.failedCount || 0}</div><div class="session-stat-label">投递失败</div></div>
      `;
      
      let html = '';
      
      // Agent Sessions (conversations)
      if (data.agentSessions?.length > 0) {
        html += '<div style="font-weight:600;font-size:14px;color:var(--text-secondary);margin-bottom:8px;">💬 最近会话</div>';
        data.agentSessions.forEach(s => {
          const lastTime = s.lastTimestamp ? new Date(s.lastTimestamp).toLocaleString('zh-CN') : '未知';
          const sizeKB = (s.size / 1024).toFixed(1);
          html += `<div class="session-item">
            <div class="session-header">
              <span class="session-name">${s.id.substring(0, 20)}...</span>
              <span class="session-badge ${s.isDeleted ? 'deleted' : s.type === 'topic' ? 'topic' : ''}">${s.type}</span>
            </div>
            <div class="cron-details">
              <div class="cron-detail">消息数: <span>${s.messages}</span></div>
              <div class="cron-detail">大小: <span>${sizeKB} KB</span></div>
              <div class="cron-detail">最后活动: <span>${lastTime}</span></div>
            </div>
          </div>`;
        });
      }
      
      // Telegram Bots
      if (telegramBots.length > 0) {
        html += '<div style="margin-top:16px;font-weight:600;font-size:14px;color:var(--text-secondary);margin-bottom:8px;">📱 Telegram Bots</div>';
        telegramBots.forEach(s => {
          html += `<div class="session-item">
            <div class="session-header">
              <span class="session-name">${s.id}</span>
              <span class="session-badge">Bot</span>
            </div>
            <div class="cron-details">
              <div class="cron-detail">Bot ID: <span>${s.botId}</span></div>
              <div class="cron-detail">Version: <span>${s.version || 1}</span></div>
              <div class="cron-detail">lastUpdateId: <span>${s.lastUpdateId || '未知'}</span></div>
            </div>
          </div>`;
        });
      }
      
      // Delivery Queue (failed)
      if (data.summary?.failedCount > 0) {
        html += '<div style="margin-top:16px;font-weight:600;font-size:14px;color:var(--accent-danger);margin-bottom:8px;">❌ 投递失败队列</div>';
        data.deliveryQueue.filter(q => q.id.includes('failed')).slice(0, 5).forEach(q => {
          html += `<div class="session-item" style="border-color:var(--accent-danger);">
            <div class="session-header">
              <span class="session-name" style="font-size:12px;">${q.id.substring(0, 30)}...</span>
              <span class="session-badge" style="background:var(--accent-danger);">Failed</span>
            </div>
          </div>`;
        });
      }
      
      document.getElementById('sessions-list').innerHTML = html || '暂无会话数据';
    }

    // Skills - with pagination
    let skillState = { clawhub: [], awesome: [], installed: [] };
    let skillPages = { clawhub: 0, awesome: 0 };
    const PAGE_SIZE = 20;

    async function loadSkills() {
      const [installed, clawhubData, awesomeData] = await Promise.all([
        api('/api/skills'),
        fetch('https://clawhub.ai/api/v1/skills?sort=downloads').then(r => r.json()).catch(() => ({items: []})),
        fetch('https://raw.githubusercontent.com/VoltAgent/awesome-agent-skills/main/README.md').then(r => r.text()).catch(() => '')
      ]);
      
      skillState.installed = installed || [];
      const installedNames = skillState.installed.map(s => s.name);
      skillState.clawhub = (clawhubData.items || []).filter(s => !installedNames.includes(s.displayName));
      
      // Parse Awesome
      const awesome = [];
      const lines = awesomeData.split('\n');
      let section = '';
      for (const line of lines) {
        if (line.startsWith('### ')) section = line.replace('### ', '').trim();
        else if (line.startsWith('- **[') && line.includes('](')) {
          const m = line.match(/- \*\*\[([^\]]+)\]\([^)]+\)\*\* - (.+)/);
          if (m && section) awesome.push({name: m[1], description: m[2].trim(), source: section});
        }
      }
      skillState.awesome = awesome;
      
      renderSkills();
    }
    
    // ========== Chat Functions ==========
    let chatSessions = [];
    let currentChatSession = null;
    let chatHistory = [];
    const chatStorageKey = 'oc_chat_history';
    const chatCurrentKey = 'oc_chat_current';
    
    function loadChatHistory(key) {
      try {
        const data = localStorage.getItem(chatStorageKey);
        if (data) {
          const all = JSON.parse(data);
          return all[key] || [{ role: 'system', content: 'You are a helpful AI assistant.' }];
        }
      } catch (e) {}
      return [{ role: 'system', content: 'You are a helpful AI assistant.' }];
    }
    
    function saveChatHistory(key, history) {
      try {
        const data = localStorage.getItem(chatStorageKey);
        const all = data ? JSON.parse(data) : {};
        all[key] = history;
        localStorage.setItem(chatStorageKey, JSON.stringify(all));
      } catch (e) {}
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function loadChatSessions() {
      try {
        const res = await fetch('/api/chat/sessions');
        chatSessions = await res.json();
        renderChatSessions();
      } catch (e) {
        document.getElementById('chat-sessions').innerHTML = '加载失败: ' + e.message;
      }
    }
    
    function renderChatSessions() {
      const container = document.getElementById('chat-sessions');
      if (chatSessions.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);padding:8px;">暂无会话</div>';
        return;
      }
      
      container.innerHTML = chatSessions.map(s => `
        <div class="session-item ${currentChatSession && currentChatSession.key === s.key ? 'active' : ''}" 
             onclick="selectChatSession('${s.key}')"
             style="padding:10px;border-radius:6px;cursor:pointer;margin-bottom:4px;font-size:12px;position:relative;display:flex;align-items:center;justify-content:space-between;${currentChatSession && currentChatSession.key === s.key ? 'background:var(--accent-primary);' : ''}">
          <div style="flex:1;overflow:hidden;">
            <div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(s.name)}</div>
            <div class="session-type" style="font-size:10px;color:var(--text-muted);">${s.type === 'telegram' ? '📱' : '🌐'}</div>
          </div>
          <div style="display:flex;gap:4px;" onclick="event.stopPropagation();">
            <button onclick="renameSession('${s.key}', '${escapeHtml(s.name).replace(/'/g, "\\'")}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 6px;font-size:12px;" title="重命名">✏️</button>
            <button onclick="deleteSession('${s.key}', '${escapeHtml(s.name).replace(/'/g, "\\'")}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;padding:2px 6px;font-size:12px;" title="删除">🗑️</button>
          </div>
        </div>
      `).join('');
    }
    
    function toggleChatDrawer() {
      document.getElementById('chat-drawer').classList.toggle('open');
      document.getElementById('chat-drawer-overlay').classList.toggle('open');
    }
    
    function renameSession(key, name) {
      const newName = prompt('重命名会话:', name);
      if (newName && newName !== name) renameChatSession(key, newName);
    }
    
    function deleteSession(key, name) {
      if (confirm(`确定删除会话"${name}"？`)) deleteChatSession(key);
    }
    
    async function renameChatSession(key, newName) {
      try {
        const res = await fetch('/api/chat/sessions/' + key, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: newName })
        });
        if (!res.ok) throw new Error('重命名失败');
        const idx = chatSessions.findIndex(s => s.key === key);
        if (idx >= 0) { chatSessions[idx].name = newName; }
        if (currentChatSession && currentChatSession.key === key) currentChatSession.name = newName;
        renderChatSessions();
        document.getElementById('chat-current-name').textContent = '💬 ' + newName;
      } catch (e) { alert('重命名失败: ' + e.message); }
    }
    
    async function deleteChatSession(key) {
      try {
        const res = await fetch('/api/chat/sessions/' + key, { method: 'DELETE' });
        if (!res.ok) throw new Error('删除失败');
        chatSessions = chatSessions.filter(s => s.key !== key);
        localStorage.removeItem(chatStorageKey + '_' + key);
        if (currentChatSession && currentChatSession.key === key) {
          currentChatSession = null;
          localStorage.removeItem(chatCurrentKey);
        }
        renderChatSessions();
        renderChatMessages();
      } catch (e) { alert('删除失败: ' + e.message); }
    }
    
    function selectChatSession(key) {
      // Save current history
      if (currentChatSession && currentChatSession.key && chatHistory.length > 0) {
        saveChatHistory(currentChatSession.key, chatHistory);
      }
      
      const session = chatSessions.find(s => s.key === key);
      if (!session) return;
      
      currentChatSession = session;
      localStorage.setItem(chatCurrentKey, key);
      chatHistory = loadChatHistory(key);
      
      // 更新顶部会话名
      document.getElementById('chat-current-name').textContent = '💬 ' + session.name;
      
      renderChatMessages();
      renderChatSessions();
      
      // 手机端选择后关闭抽屉
      if (window.innerWidth <= 600) toggleChatDrawer();
    }
    
    function renderChatMessages() {
      const container = document.getElementById('chat-messages');
      
      if (!currentChatSession) {
        container.innerHTML = '<div style="color:var(--text-muted);text-align:center;padding:20px;">选择或创建一个会话开始聊天</div>';
        return;
      }
      
      const msgs = chatHistory.filter(m => m.role !== 'system');
      if (msgs.length === 0) {
        container.innerHTML = `<div style="color:var(--text-muted);text-align:center;padding:20px;">会话: ${escapeHtml(currentChatSession.name)}</div>`;
        return;
      }
      
      container.innerHTML = msgs.map(m => `
        <div style="max-width:85%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5;word-break:break-word;${m.role === 'user' ? 'align-self:flex-end;background:var(--user-msg);border-bottom-right-radius:4px;' : 'align-self:flex-start;background:var(--ai-msg);border-bottom-left-radius:4px;'}">
          ${escapeHtml(m.content)}
        </div>
      `).join('');
      
      container.scrollTop = container.scrollHeight;
    }
    
    async function createChatSession() {
      const name = prompt('输入会话名称:', '新会话');
      if (!name) return;
      
      try {
        const res = await fetch('/api/chat/sessions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const newSession = await res.json();
        
        chatSessions.unshift({ key: newSession.key, name: newSession.name, type: 'web' });
        selectChatSession(newSession.key);
      } catch (e) {
        alert('创建失败: ' + e.message);
      }
    }
    
    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      if (!currentChatSession) { alert('请先选择或创建一个会话'); return; }
      
      chatHistory.push({ role: 'user', content: text });
      saveChatHistory(currentChatSession.key, chatHistory);
      input.value = '';
      
      renderChatMessages();
      
      // Show typing indicator
      const container = document.getElementById('chat-messages');
      container.innerHTML += '<div id="chat-typing" style="align-self:flex-start;background:var(--ai-msg);padding:10px 14px;border-radius:12px;">...</div>';
      container.scrollTop = container.scrollHeight;
      
      try {
        const res = await fetch('/api/chat/completions', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-Openclaw-Session-Key': currentChatSession.key
          },
          body: JSON.stringify({
            model: 'openclaw',
            messages: chatHistory,
            stream: false
          })
        });
        
        if (!res.ok) throw new Error('API Error: ' + res.status);
        
        const data = await res.json();
        const reply = data.choices[0].message.content;
        
        chatHistory.push({ role: 'assistant', content: reply });
        saveChatHistory(currentChatSession.key, chatHistory);
        
        document.getElementById('chat-typing')?.remove();
        renderChatMessages();
        
      } catch (e) {
        document.getElementById('chat-typing')?.remove();
        container.innerHTML += `<div style="align-self:flex-start;background:#4a2020;color:#f87171;padding:10px 14px;border-radius:12px;">❌ ${escapeHtml(e.message)}</div>`;
        container.scrollTop = container.scrollHeight;
      }
    }
    
    async function initChat() {
      await loadChatSessions();
      
      // Restore last session
      const lastKey = localStorage.getItem(chatCurrentKey);
      if (lastKey) {
        const session = chatSessions.find(s => s.key === lastKey);
        if (session) {
          currentChatSession = session;
          chatHistory = loadChatSessionHistory(lastKey);
          document.getElementById('chat-current-name').textContent = '💬 ' + session.name;
          renderChatMessages();
          renderChatSessions();
        }
      }
    }

    async function loadLogs() {
      const file = 'gateway.log';
      const search = document.getElementById('log-search').value;
      let filter = logFilter;
      if (search) filter = filter === 'all' ? search : filter + ' ' + search;
      
      const filterParam = filter ? `&filter=${encodeURIComponent(filter)}` : '';
      const data = await api(`/api/logs?lines=200&file=${file}${filterParam}`);
      
      logData = (data.content || '').split('\n').filter(l => l.trim()).reverse();
      renderLogs();
    }

    function renderLogs() {
      const container = document.getElementById('log-container');
      container.innerHTML = logData.map(line => {
        let level = 'info';
        let msg = line;
        
        if (line.includes('error') || line.includes('Error') || line.includes('✗')) level = 'error';
        else if (line.includes('warn') || line.includes('Warn') || line.includes('WARNING')) level = 'warn';
        else if (line.includes('[ws]') || line.includes('WS')) level = 'ws';
        
        // Extract and convert time from UTC to local
        const timeMatch = line.match(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z/);
        let time = '';
        if (timeMatch) {
          const utcDate = new Date(timeMatch[0]);
          time = utcDate.toLocaleString('zh-CN', { 
            month: '2-digit', 
            day: '2-digit', 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            hour12: false 
          });
        }
        
        return `<div class="log-line">
          <span class="log-time">${time}</span>
          <span class="log-level ${level}">${level.toUpperCase()}</span>
          <span class="log-message">${msg.replace(/^\S+\s*/, '').replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z/, '')}</span>
        </div>`;
      }).join('');
      
      if (autoScroll) container.scrollTop = container.scrollHeight;
    }

    function setLogFilter(level, btn) {

      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

    async function loadConfigs() {
      configsData = await api('/api/configs');
      const cfg = configsData.find(c => c.id === currentConfig);
      if (cfg) {
        document.getElementById('config-content').value = cfg.content || '';
        // Show/hide form view based on config type
        const formView = document.getElementById('config-form-view');
        if (configSchemas[currentConfig] && configViewMode === 'form') {

        } else {
          formView.style.display = 'none';

      }
    }
    
    function renderFormView(jsonContent) {
      const container = document.getElementById('config-form-view');
      const schema = configSchemas[currentConfig];
      if (!schema) return;
      
      try {
        const config = JSON.parse(jsonContent);
        let html = '<div class="form-config">';
        
        for (const [path, field] of Object.entries(schema.fields)) {
          const value = getNestedValue(config, path);
          html += `<div class="form-field">
            <label class="form-label">${field.label}</label>`;
          
          if (field.type === 'select') {
            html += `<select class="form-select" data-path="${path}">`;
            for (const opt of field.options) {
              const selected = opt.value === value ? 'selected' : '';
              html += `<option value="${opt.value}" ${selected}>${opt.label}</option>`;
            }
            html += '</select>';
          } else if (field.type === 'toggle') {
            const checked = value ? 'checked' : '';
            html += `<label class="toggle"><input type="checkbox" data-path="${path}" ${checked}><span class="toggle-slider"></span></label>`;
          } else {
            html += `<input type="${field.type}" class="form-input" data-path="${path}" value="${value || ''}">`;
          }
          
          html += `<div class="form-desc">${field.desc || ''}</div></div>`;
        }
        
        html += '</div>';
        container.innerHTML = html;
        container.style.display = 'block';
      } catch (e) {
        container.innerHTML = '<div style="color:var(--accent-danger);">JSON格式错误，请先修复</div>';
        container.style.display = 'block';
      }
    }
    
    function getNestedValue(obj, path) {
      return path.split('.').reduce((o, k) => o?.[k], obj);
    }
    
    function setNestedValue(obj, path, value) {
      const keys = path.split('.');
      let current = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!current[keys[i]]) current[keys[i]] = {};
        current = current[keys[i]];
      }
      current[keys[keys.length - 1]] = value;
    }
    
    function toggleConfigView(mode) {
      configViewMode = mode;
      document.querySelectorAll('.view-mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
      
      const textarea = document.getElementById('config-content');
      const applyBtn = document.getElementById('apply-form-btn');
      const formView = document.getElementById('config-form-view');
      
      if (mode === 'form') {
        textarea.style.display = 'none';
        applyBtn.style.display = 'inline-block';
        // Render form view
        const cfg = configsData.find(c => c.id === currentConfig);
        if (cfg && configSchemas[currentConfig]) {
          renderFormView(cfg.content);
        }
      } else {
        textarea.style.display = 'block';
        applyBtn.style.display = 'none';
        formView.style.display = 'none';
      }
    }

        document.querySelectorAll('.form-field input, .form-field select').forEach(el => {
          const path = el.dataset.path;
          let value = el.type === 'checkbox' ? el.checked : el.value;
          if (el.type === 'number') value = parseInt(value);
          setNestedValue(config, path, value);
        });
        document.getElementById('config-content').value = JSON.stringify(config, null, 2);
        showToast('表单更改已应用到JSON');

    }

    }

    async function runDoctorFix() {
      if (!confirm('确定要运行Doctor Fix吗？')) return;
      showToast('正在执行Doctor Fix...');
      const res = await fetch(API_BASE + '/api/doctor/fix', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        alert('Doctor Fix 完成\n\n' + (data.output || '').substring(0, 2000));
      } else {
        showToast('Doctor Fix失败: ' + data.error);
      }
    }

    // Init
    refreshAll();
  </script>
</body>
</html>
