<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-card-hover: #222230;
      --accent-primary: #6366f1;
      --accent-secondary: #8b5cf6;
      --accent-success: #10b981;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #2d2d3a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15), transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.1), transparent 50%);
      pointer-events: none;
      z-index: -1;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 16px; padding-bottom: 80px; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border-color);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 18px;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .btn {
      padding: 8px 16px; border-radius: var(--radius-sm); border: none;
      cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: white; }
    .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-color); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer; }
    .tabs {
      display: flex; gap: 4px; background: var(--bg-secondary); padding: 4px;
      border-radius: var(--radius-md); margin-bottom: 20px; overflow-x: auto;
    }
    .tab {
      padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary);
      background: transparent; border: none; border-radius: var(--radius-sm);
      cursor: pointer; white-space: nowrap; transition: all 0.2s;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { background: var(--accent-primary); color: white; }
    .section { display: none; }
    .section.active { display: block; }
    .card {
      background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px;
      margin-bottom: 16px; border: 1px solid var(--border-color);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .status-item { background: var(--bg-secondary); padding: 16px; border-radius: var(--radius-md); }
    .status-label { font-size: 12px; color: var(--text-muted); }
    .status-value { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
    .success { color: var(--accent-success); }
    .danger { color: var(--accent-danger); }
    .warning { color: var(--accent-warning); }
    
    /* Model Selector */
    .model-current {
      padding: 16px 20px; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1));
      border: 2px solid var(--accent-primary); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; transition: all 0.2s;
    }
    .model-current:hover { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2)); }
    .model-current.active { background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.2)); }
    .model-badge {
      padding: 4px 10px; background: var(--accent-primary); color: white;
      font-size: 10px; font-weight: 600; border-radius: 10px; text-transform: uppercase;
    }
    .model-name { font-weight: 600; font-size: 16px; }
    .model-detail { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .model-list { display: none; flex-direction: column; gap: 8px; margin-top: 12px; }
    .model-list.show { display: flex; }
    .model-item {
      padding: 14px 18px; background: var(--bg-secondary); border-radius: var(--radius-md);
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
      transition: all 0.2s; border: 2px solid transparent;
    }
    .model-item:hover { background: var(--bg-card-hover); border-color: var(--accent-primary); }
    .model-item.active { border: 2px solid var(--accent-success); background: rgba(16,185,129,0.1); }
    .model-check { color: var(--accent-success); font-size: 18px; }
    
    /* Log Viewer */
    .log-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }
    .log-filters { display: flex; gap: 4px; }
    .filter-btn {
      padding: 6px 12px; font-size: 12px; font-weight: 500;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: 12px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--bg-card-hover); }
    .filter-btn.active { background: var(--accent-primary); color: white; border-color: var(--accent-primary); }
    .log-actions { display: flex; gap: 8px; }
    .log-container {
      background: #0d1117; border-radius: var(--radius-md); padding: 12px;
      max-height: 500px; overflow-y: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      line-height: 1.7; color: #c9d1d9;
    }
    .log-line { display: flex; gap: 8px; padding: 2px 0; }
    .log-time { color: var(--text-muted); flex-shrink: 0; }
    .log-level { flex-shrink: 0; width: 50px; }
    .log-level.info { color: var(--accent-primary); }
    .log-level.warn { color: var(--accent-warning); }
    .log-level.error { color: var(--accent-danger); }
    .log-level.ws { color: var(--accent-success); }
    
    /* Config */
    .config-tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .config-tab {
      padding: 6px 12px; font-size: 12px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
    }
    .config-tab.active { background: var(--accent-primary); color: white; }
    .config-actions { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 10px; }
    .config-editor textarea {
      width: 100%; min-height: 400px; padding: 14px;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
      resize: none; box-sizing: border-box;
    }
    .config-editor textarea:focus { outline: none; border-color: var(--accent-primary); }
    
    /* Backup */
    .backup-item {
      padding: 12px; background: var(--bg-secondary); border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .backup-info { flex: 1; }
    .backup-name { font-weight: 500; font-size: 13px; }
    .backup-time { font-size: 11px; color: var(--text-muted); }
    .backup-actions { display: flex; gap: 6px; }
    
    /* Skills */
    .skill-item {
      padding: 14px 16px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px; cursor: pointer; transition: all 0.2s;
    }
    .skill-item:hover { background: var(--bg-card-hover); }
    .skill-name { font-weight: 500; font-size: 14px; margin-bottom: 4px; }
    .skill-desc { font-size: 12px; color: var(--text-muted); }
    
    /* Cron */
    .cron-item {
      padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px;
    }
    .cron-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cron-name { font-weight: 600; font-size: 15px; }
    .cron-status { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .cron-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-success); }
    .cron-dot.stopped { background: var(--accent-danger); }
    .cron-details { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 12px; color: var(--text-muted); }
    .cron-detail span { color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
    
    /* Sessions */
    .session-item {
      padding: 14px; background: var(--bg-secondary); border-radius: var(--radius-md);
      margin-bottom: 10px;
    }
    .session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .session-name { font-weight: 500; font-size: 14px; }
    .session-badge {
      padding: 2px 8px; font-size: 10px; border-radius: 10px; background: var(--accent-primary); color: white;
    }
    .session-stats { display: flex; gap: 12px; }
    .session-stat { text-align: center; }
    .session-stat-value { font-size: 20px; font-weight: 600; }
    .session-stat-label { font-size: 11px; color: var(--text-muted); }
    
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); border: 1px solid var(--border-color);
      padding: 12px 20px; border-radius: var(--radius-md); font-size: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1000; display: none;
    }
    .toast.show { display: block; }
    
    select, input {
      padding: 8px 12px; background: var(--bg-secondary);
      border: 1px solid var(--border-color); border-radius: var(--radius-sm);
      color: var(--text-primary); font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-left">
        <div class="logo">OC</div>
        <h1>OpenClaw Dashboard</h1>
      </div>
      <button class="btn-icon" onclick="refreshAll()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">概览</button>
      <button class="tab" data-tab="cron">定时任务</button>
      <button class="tab" data-tab="sessions">会话</button>
      <button class="tab" data-tab="skills">Skills</button>
      <button class="tab" data-tab="logs">日志</button>
      <button class="tab" data-tab="config">配置</button>
    </div>

    <!-- Dashboard -->
    <div class="section active" id="section-dashboard">
      <!-- Model Selector -->
      <div class="card" style="background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1)); border: 2px solid var(--accent-primary);">
        <div class="card-header"><span class="card-title">🤖 当前模型</span></div>
        <div class="model-current" onclick="toggleModelList()">
          <div>
            <div class="model-name" id="current-model-name">--</div>
            <div class="model-detail" id="current-model-detail">点击选择模型</div>
          </div>
          <span class="model-badge" id="current-model-badge">当前</span>
        </div>
        <div class="model-list" id="model-list"></div>
      </div>
      
      <!-- Weather -->
      <div class="card" style="background: linear-gradient(135deg, #1e3a5f, #0f172a); border: 1px solid #1e40af;">
        <div style="text-align:center;margin-bottom:12px;">
          <div style="font-size:20px;font-weight:600;color:#fff;margin-bottom:4px;" id="greeting-text">你好 👋</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);" id="datetime-text">--</div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:14px;color:rgba(255,255,255,0.7);">🌤️ 北京天气</div>
            <div style="font-size:32px;font-weight:700;margin:8px 0;color:#fff;" id="weather-temp">--°</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);" id="weather-desc">加载中...</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:8px;">
              💧 湿度: <span id="weather-humidity">--</span>% | 体感: <span id="weather-feels">--</span>°
            </div>
          </div>
          <div style="font-size:48px;" id="weather-icon">⛅</div>
        </div>
      </div>
      
      <!-- System Status -->
      <div class="card">
        <div class="card-header"><span class="card-title">📊 系统状态</span></div>
        <div class="status-grid">
          <div class="status-item">
            <div class="status-label">Gateway</div>
            <div class="status-value" id="gw-status">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">版本 <span id="version-badge" style="display:none;padding:2px 6px;background:var(--accent-warning);color:#000;font-size:10px;border-radius:8px;margin-left:4px;">新!</span></div>
            <div class="status-value" id="version">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">Telegram</div>
            <div class="status-value" id="tg-status">--</div>
          </div>
          <div class="status-item">
            <div class="status-label">定时任务</div>
            <div class="status-value" id="cron-count">--</div>
          </div>
        </div>
      </div>
    </div>
        </div>
        <div class="model-list" id="model-list"></div>
      </div>
    </div>

    <!-- Cron -->
    <div class="section" id="section-cron">
      <div class="card">
        <div class="card-header"><span class="card-title">⏰ 定时任务</span></div>
        <div id="cron-list">加载中...</div>
      </div>
    </div>

    <!-- Sessions -->
    <div class="section" id="section-sessions">
      <div class="card">
        <div class="card-header"><span class="card-title">💬 会话状态</span></div>
        <div id="sessions-stats" class="session-stats" style="margin-bottom:16px;"></div>
        <div id="sessions-list">加载中...</div>
      </div>
    </div>

    <!-- Skills -->
    <div class="section" id="section-skills">
      <div class="card">
        <div class="card-header"><span class="card-title">🔧 Skills 列表</span></div>
        <div id="skills-list">加载中...</div>
      </div>
    </div>

    <!-- Logs -->
    <div class="section" id="section-logs">
      <div class="card">
        <div class="log-toolbar">
          <div class="log-filters">
            <button class="filter-btn active" data-level="all" onclick="setLogFilter('all', this)">全部</button>
            <button class="filter-btn" data-level="info" onclick="setLogFilter('info', this)">Info</button>
            <button class="filter-btn" data-level="warn" onclick="setLogFilter('warn', this)">Warn</button>
            <button class="filter-btn" data-level="error" onclick="setLogFilter('error', this)">Error</button>
            <button class="filter-btn" data-level="ws" onclick="setLogFilter('ws', this)">WS</button>
          </div>
          <div class="log-actions">
            <button class="btn btn-sm" onclick="toggleAutoScroll()" id="autoscroll-btn">⏸ 暂停</button>
            <button class="btn btn-sm btn-secondary" onclick="clearLogs()">清空</button>
            <button class="btn btn-sm btn-primary" onclick="loadLogs()">刷新</button>
          </div>
        </div>
        <input type="text" id="log-search" placeholder="搜索关键词..." style="width:100%;margin-bottom:12px;" oninput="loadLogs()" />
        <div class="log-container" id="log-container">
          <div class="log-line"><span class="log-time">加载中...</span></div>
        </div>
      </div>
    </div>

    <!-- Config -->
    <div class="section" id="section-config">
      <div class="card">
        <div class="card-header"><span class="card-title">⚡ 快捷操作</span></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <button class="btn btn-primary" onclick="createBackup()">💾 备份</button>
          <button class="btn btn-secondary" onclick="restartGateway()">🔄 重启</button>
          <button class="btn btn-secondary" onclick="runDoctorFix()">🩺 Doctor</button>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📋 备份记录</span></div>
        <div id="backup-list">加载中...</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📁 配置文件</span></div>
        <div class="config-tabs">
          <button class="config-tab active" onclick="switchConfig('openclaw.json', this)">openclaw.json</button>
          <button class="config-tab" onclick="switchConfig('jobs.json', this)">jobs.json</button>
          <button class="config-tab" onclick="switchConfig('AGENTS.md', this)">AGENTS.md</button>
          <button class="config-tab" onclick="switchConfig('SOUL.md', this)">SOUL.md</button>
          <button class="config-tab" onclick="switchConfig('TOOLS.md', this)">TOOLS.md</button>
          <button class="config-tab" onclick="switchConfig('USER.md', this)">USER.md</button>
          <button class="config-tab" onclick="switchConfig('MEMORY.md', this)">MEMORY.md</button>
        </div>
        <div class="config-actions">
          <button class="btn btn-secondary" onclick="validateConfig()">✓ 验证</button>
          <button class="btn btn-primary" onclick="saveConfig()">💾 保存</button>
        </div>
        <textarea id="config-content" style="width:100%;min-height:400px;resize:none;"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '';
    let currentTab = 'dashboard';
    let currentConfig = 'openclaw.json';
    let logFilter = 'all';
    let autoScroll = true;
    let logData = [];

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function api(url) {
      try {
        const res = await fetch(API_BASE + url);
        return await res.json();
      } catch (e) {
        return { error: e.message };
      }
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('section-' + tab.dataset.tab).classList.add('active');
        currentTab = tab.dataset.tab;
        if (currentTab === 'logs') loadLogs();
      });
    });

    async function refreshAll() {
      loadStatus();
      loadModels();
      loadCron();
      loadSessions();
      loadSkills();
      loadLogs();
      loadBackups();
      loadConfigs();
      showToast('已刷新');
    }

    // Status
    async function loadStatus() {
      const [statusData, weatherData] = await Promise.all([
        api('/api/status'),
        api('/api/weather')
      ]);
      
      if (!statusData.error) {
        document.getElementById('gw-status').textContent = statusData.gatewayStatus === 'running' ? '运行中' : '已停止';
        document.getElementById('gw-status').className = 'status-value ' + (statusData.gatewayStatus === 'running' ? 'success' : 'danger');
        document.getElementById('version').textContent = statusData.version || '--';
        
        // Show version update badge
        if (statusData.updateInfo?.available) {
          const badge = document.getElementById('version-badge');
          badge.textContent = 'v' + statusData.updateInfo.version + ' 新!';
          badge.style.display = 'inline';
        }
        
        document.getElementById('tg-status').textContent = statusData.channels?.telegram?.enabled ? '已启用' : '未启用';
        document.getElementById('cron-count').textContent = statusData.cronJobs || 0;
      }
      
      // Weather
      if (!weatherData.error && !weatherData.configNeeded) {
        const icons = {'01d':'☀️','01n':'🌙','02d':'⛅','02n':'☁️','03d':'☁️','03n':'☁️','04d':'☁️','04n':'☁️','09d':'🌧️','09n':'🌧️','10d':'🌦️','10n':'🌧️','11d':'⛈️','11n':'⛈️','13d':'❄️','13n':'❄️','50d':'🌫️','50n':'🌫️'};
        document.getElementById('weather-icon').textContent = icons[weatherData.icon] || '⛅';
        document.getElementById('weather-temp').textContent = (weatherData.temp || '--') + '°';
        document.getElementById('weather-desc').textContent = weatherData.description || '--';
        document.getElementById('weather-humidity').textContent = weatherData.humidity || '--';
        document.getElementById('weather-feels').textContent = weatherData.feels_like || '--';
      } else {
        document.getElementById('weather-temp').textContent = '--°';
        document.getElementById('weather-desc').textContent = '未配置';
      }
      
      // Update greeting and datetime
      updateGreeting();
    }
    
    function updateGreeting() {
      const now = new Date();
      const hour = now.getHours();
      let greeting = '你好';
      let emoji = '👋';
      
      if (hour >= 5 && hour < 9) { greeting = '早上好'; emoji = '🌅'; }
      else if (hour >= 9 && hour < 12) { greeting = '上午好'; emoji = '☀️'; }
      else if (hour >= 12 && hour < 14) { greeting = '中午好'; emoji = '🍜'; }
      else if (hour >= 14 && hour < 15) { greeting = '下午茶时间'; emoji = '☕'; }
      else if (hour >= 15 && hour < 18) { greeting = '下午好'; emoji = '🌤️'; }
      else if (hour >= 18 && hour < 22) { greeting = '晚上好'; emoji = '🌙'; }
      else { greeting = '夜深了'; emoji = '🌃'; }
      
      document.getElementById('greeting-text').textContent = greeting + ' ' + emoji;
      
      const dateStr = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('datetime-text').textContent = dateStr + ' ' + timeStr;
    }

    // Models
    async function loadModels() {
      const data = await api('/api/models');
      const primary = data.defaults?.primary || '';
      
      document.getElementById('current-model-name').textContent = primary || '未设置';
      document.getElementById('current-model-detail').textContent = '点击切换模型';
      
      const list = document.getElementById('model-list');
      let html = '';
      for (const [provider, cfg] of Object.entries(data.providers || {})) {
        for (const model of cfg.models || []) {
          const fullId = provider + '/' + model.id;
          const isActive = fullId === primary;
          html += `
            <div class="model-item ${isActive ? 'active' : ''}" onclick="switchModel('${provider}', '${model.id}')">
              <div>
                <div class="model-name">${model.name}</div>
                <div class="model-detail">${provider} · ${(model.contextWindow / 1000).toFixed(0)}K</div>
              </div>
              ${isActive ? '<span class="model-check">✓</span>' : ''}
            </div>
          `;
        }
      }
      list.innerHTML = html;
    }

    function toggleModelList() {
      document.getElementById('model-list').classList.toggle('show');
      document.querySelector('.model-current').classList.toggle('active');
    }

    async function switchModel(provider, modelId) {
      const primary = provider + '/' + modelId;
      await fetch(API_BASE + '/api/models/switch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ primary, fallbacks: [] })
      });
      showToast('模型已切换: ' + modelId);
      loadModels();
      toggleModelList();
    }

    // Cron
    async function loadCron() {
      const data = await api('/api/cron');
      const container = document.getElementById('cron-list');
      container.innerHTML = (data || []).map(j => `
        <div class="cron-item">
          <div class="cron-header">
            <span class="cron-name">${j.name || j.id}</span>
            <div class="cron-status">
              <div class="cron-dot ${j.enabled ? '' : 'stopped'}"></div>
              <span>${j.enabled ? '运行中' : '已停止'}</span>
            </div>
          </div>
          <div class="cron-details">
            <div class="cron-detail">执行时间: <span>${j.schedule}</span></div>
            <div class="cron-detail">任务类型: <span>${j.model}</span></div>
            <div class="cron-detail">下次执行: <span>${j.nextRun || '--'}</span></div>
            <div class="cron-detail">上次状态: <span>${j.lastStatus || '--'}</span></div>
          </div>
        </div>
      `).join('') || '暂无定时任务';
    }

    // Sessions
    async function loadSessions() {
      const data = await api('/api/sessions');
      
      // Show only Telegram bots that have a botId (actual bots)
      const telegramBots = (data.telegram || []).filter(s => s.botId);
      const summary = { telegramCount: telegramBots.length };
      
      document.getElementById('sessions-stats').innerHTML = `
        <div class="session-stat"><div class="session-stat-value success">${telegramBots.length}</div><div class="session-stat-label">Telegram Bot</div></div>
        <div class="session-stat"><div class="session-stat-value">${data.deliveryQueue?.length || 0}</div><div class="session-stat-label">投递队列</div></div>
      `;
      
      let html = '';
      telegramBots.forEach(s => {
        html += `<div class="session-item">
          <div class="session-header">
            <span class="session-name">${s.id}</span>
            <span class="session-badge">Bot: ${s.botId}</span>
          </div>
          <div class="cron-details">
            <div class="cron-detail">lastUpdateId: <span>${s.lastUpdateId || '未知'}</span></div>
          </div>
        </div>`;
      });
      
      if (data.deliveryQueue?.length > 0) {
        html += '<div style="margin-top:16px;font-weight:600;font-size:14px;color:var(--text-secondary);">投递队列</div>';
        data.deliveryQueue.slice(0, 5).forEach(q => {
          html += `<div class="session-item">
            <div class="session-header">
              <span class="session-name" style="font-size:12px;">${q.id}</span>
              <span class="session-badge" style="background:var(--accent-warning);">Queue</span>
            </div>
          </div>`;
        });
      }
      
      document.getElementById('sessions-list').innerHTML = html || '暂无Telegram Bot';
    }

    // Skills
    async function loadSkills() {
      const data = await api('/api/skills');
      const container = document.getElementById('skills-list');
      container.innerHTML = (data || []).map(s => `
        <div class="skill-item">
          <div style="display:flex;justify-content:space-between;align-items:start;">
            <div>
              <div class="skill-name">${s.name}</div>
              <div class="skill-desc">${s.description || '暂无描述'}</div>
            </div>
            <a href="#" onclick="alert('路径: ${s.path}')" style="color:var(--accent-primary);font-size:12px;">📂 查看</a>
          </div>
        </div>
      `).join('') || '暂无Skills';
    }

    // Logs
    async function loadLogs() {
      const file = 'gateway.log';
      const search = document.getElementById('log-search').value;
      let filter = logFilter;
      if (search) filter = filter === 'all' ? search : filter + ' ' + search;
      
      const filterParam = filter ? `&filter=${encodeURIComponent(filter)}` : '';
      const data = await api(`/api/logs?lines=200&file=${file}${filterParam}`);
      
      logData = (data.content || '').split('\n').filter(l => l.trim()).reverse();
      renderLogs();
    }

    function renderLogs() {
      const container = document.getElementById('log-container');
      container.innerHTML = logData.map(line => {
        let level = 'info';
        let msg = line;
        
        if (line.includes('error') || line.includes('Error') || line.includes('✗')) level = 'error';
        else if (line.includes('warn') || line.includes('Warn') || line.includes('WARNING')) level = 'warn';
        else if (line.includes('[ws]') || line.includes('WS')) level = 'ws';
        
        // Extract time
        const timeMatch = line.match(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z/);
        const time = timeMatch ? timeMatch[0].replace('T', ' ').substring(0, 19) : '';
        
        return `<div class="log-line">
          <span class="log-time">${time}</span>
          <span class="log-level ${level}">${level.toUpperCase()}</span>
          <span class="log-message">${msg.replace(/^\S+\s*/, '').replace(/^\d{4}-\d{2}-\d{2}T[\d:.]+Z/, '')}</span>
        </div>`;
      }).join('');
      
      if (autoScroll) container.scrollTop = container.scrollHeight;
    }

    function setLogFilter(level, btn) {
      logFilter = level;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadLogs();
    }

    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      document.getElementById('autoscroll-btn').textContent = autoScroll ? '⏸ 暂停' : '▶️ 继续';
    }

    function clearLogs() {
      logData = [];
      renderLogs();
    }

    // Config
    async function loadConfigs() {
      const data = await api('/api/configs');
      const cfg = data.find(c => c.id === currentConfig);
      if (cfg) document.getElementById('config-content').value = cfg.content || '';
    }

    function switchConfig(id, btn) {
      currentConfig = id;
      document.querySelectorAll('.config-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadConfigs();
    }

    async function saveConfig() {
      const content = document.getElementById('config-content').value;
      const res = await fetch(API_BASE + '/api/config/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentConfig, content })
      });
      const data = await res.json();
      showToast(data.success ? '配置已保存' : '保存失败');
    }

    function validateConfig() {
      const content = document.getElementById('config-content').value;
      if (currentConfig.endsWith('.json')) {
        try {
          JSON.parse(content);
          showToast('✓ JSON格式正确');
        } catch (e) {
          showToast('✗ JSON格式错误: ' + e.message);
        }
      } else {
        showToast('✓ 格式检查通过');
      }
    }

    // Backup
    async function loadBackups() {
      const data = await api('/api/backups');
      const container = document.getElementById('backup-list');
      container.innerHTML = (data || []).map(b => `
        <div class="backup-item">
          <div class="backup-info">
            <div class="backup-name">${b.name}</div>
            <div class="backup-time">${new Date(b.created).toLocaleString('zh-CN')}</div>
          </div>
          <div class="backup-actions">
            <button class="btn btn-sm btn-secondary" onclick="viewBackup('${b.name}')">查看</button>
            <button class="btn btn-sm btn-secondary" onclick="restoreBackup('${b.name}')">恢复</button>
          </div>
        </div>
      `).join('') || '暂无备份';
    }

    async function viewBackup(name) {
      const data = await api('/api/backup/' + name + '/details');
      const time = (data.changelog || '').match(/\*\*备份时间\*\*:\s*(.+)/)?.[1] || '未知';
      const content = (data.changelog || '').match(/### 修改内容\n(.+?)(?=\n###|$)/s)?.[1]?.replace(/^- /gm, '').trim() || '无';
      alert('📋 ' + name + '\n\n⏰ ' + time + '\n\n📝 ' + content);
    }

    async function restoreBackup(name) {
      if (!confirm('确定要恢复 ' + name + ' 吗？')) return;
      const res = await fetch(API_BASE + '/api/backup/' + name + '/restore', { method: 'POST' });
      const data = await res.json();
      showToast(data.success ? '备份已恢复' : '恢复失败');
    }

    async function createBackup() {
      const desc = prompt('备份说明:', '手动备份');
      if (!desc) return;
      const res = await fetch(API_BASE + '/api/backup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: desc })
      });
      const data = await res.json();
      showToast(data.success ? '备份成功' : '备份失败');
      loadBackups();
    }

    async function restartGateway() {
      if (!confirm('确定要重启Gateway吗？')) return;
      const res = await fetch(API_BASE + '/api/gateway/restart', { method: 'POST' });
      const data = await res.json();
      showToast(data.success ? 'Gateway正在重启...' : '重启失败');
    }

    async function runDoctorFix() {
      if (!confirm('确定要运行Doctor Fix吗？')) return;
      showToast('正在执行Doctor Fix...');
      const res = await fetch(API_BASE + '/api/doctor/fix', { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        alert('Doctor Fix 完成\n\n' + (data.output || '').substring(0, 2000));
      } else {
        showToast('Doctor Fix失败: ' + data.error);
      }
    }

    // Init
    refreshAll();
  </script>
</body>
</html>
